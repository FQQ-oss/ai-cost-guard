spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_cost_guard?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

jwt:
  secret: aicostguard-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

logging:
  level:
    com.aicostguard: debug
